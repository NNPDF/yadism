jobs:
  apfel:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION_WORKFLOWS }}

      - name: Install yadism
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run apfel benchmarks
        run: |
          # pytest benchmarks/runners/apfel.py
          # just check that apfel is actually available, for the time being
          #   waiting for: *proper runner*
          python -c "import apfel"

  qcdnum:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION_WORKFLOWS }}

      - name: Install yadism
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run qcdnum benchmarks
        run: |
          pytest benchmarks/runners/qcdnum_.py

  xspace-bench:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION_WORKFLOWS }}

      - name: Install yadism
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run qcdnum benchmarks
        run: |
          pytest benchmarks/runners/qcdnum_.py

      - uses: actions/checkout@v2
      - name: Install yadism
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run apfel benchmarks
        run: |
          # pytest benchmarks/runners/xspace-bench.py
          # just check that apfel is actually available, for the time being
          #   waiting for: *required PDFsets*
          python -c "import xspace_bench"
